<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureBank™ — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@600;800&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--green:#00ff9f;--cyan:#00d4ff;--red:#ff3c5f;--yellow:#ffe600;--bg:#060a0f;--panel:#0a1628;--border:#0d2a4a;--text:#c8e6ff;--dim:#4a7a9b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03)1px,transparent 1px);background-size:60px 60px;animation:g 20s linear infinite;pointer-events:none;}
  @keyframes g{to{background-position:0 60px;}}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15)2px,rgba(0,0,0,.15)4px);pointer-events:none;}

  .login-wrap{position:relative;z-index:2;width:100%;max-width:420px;padding:24px;}
  .bank-logo{text-align:center;margin-bottom:40px;}
  .bank-logo h1{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:800;color:var(--green);text-shadow:0 0 20px rgba(0,255,159,.4);letter-spacing:3px;}
  .bank-logo p{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--dim);letter-spacing:3px;margin-top:6px;}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:36px 32px;position:relative;}
  .card::before{content:'SECURE_LOGIN.exe';font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--dim);position:absolute;top:12px;right:14px;}

  .card h2{font-family:'Orbitron',monospace;font-size:.85rem;color:var(--cyan);letter-spacing:3px;margin-bottom:28px;padding-bottom:12px;border-bottom:1px solid var(--border);}

  .field{margin-bottom:20px;}
  .field label{display:block;font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--dim);letter-spacing:2px;margin-bottom:8px;}
  .field input{width:100%;background:#020810;border:1px solid var(--border);border-radius:3px;padding:12px 16px;color:var(--green);font-family:'Share Tech Mono',monospace;font-size:1rem;outline:none;transition:border-color .2s;}
  .field input:focus{border-color:var(--cyan);}

  .error{background:rgba(255,60,95,.1);border:1px solid var(--red);border-radius:3px;padding:10px 14px;font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--red);margin-bottom:20px;}

  .btn-login{width:100%;padding:14px;background:transparent;border:2px solid var(--green);border-radius:3px;color:var(--green);font-family:'Orbitron',monospace;font-size:.9rem;font-weight:600;letter-spacing:3px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .btn-login::before{content:'';position:absolute;inset:0;background:var(--green);transform:translateX(-101%);transition:transform .25s ease;z-index:-1;}
  .btn-login:hover{color:var(--bg);}
  .btn-login:hover::before{transform:none;}

  .demo-hint{margin-top:20px;padding:14px;background:rgba(0,255,159,.05);border:1px solid rgba(0,255,159,.15);border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--dim);text-align:center;}
  .demo-hint strong{color:var(--green);}

  .instructions-link{display:block;text-align:center;margin-top:20px;font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--dim);text-decoration:none;letter-spacing:1px;}
  .instructions-link:hover{color:var(--yellow);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .login-wrap{animation:fadeUp .5s ease both;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="bank-logo">
    <h1>SecureBank™</h1>
    <p>// TRUSTED BY MILLIONS //</p>
  </div>
  <div class="card">
    <h2>◈ AUTHENTICATE</h2>
    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>USERNAME</label>
        <input type="text" name="username" placeholder="enter username" autocomplete="off">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="enter password">
      </div>
      <button type="submit" class="btn-login">ACCESS ACCOUNT</button>
    </form>
    <div class="demo-hint">Demo credentials: <strong>student / student</strong></div>
    <a href="/instructions" class="instructions-link">← view challenge instructions</a>
  </div>
</div>
</body>
</html>
